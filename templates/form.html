<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: rgb(255, 255, 255);
        }
        .navbar {
            background: transparent;
        }
        .navbar a {
            color: rgb(255, 255, 255);
            margin-left: 15px;
        }
        .navbar-brand {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .form-section {
            background: linear-gradient(135deg, #ff5f6d, #ffc371);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px; 
            width: 100%;
        }
        .form-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-label {
            color: #333;
        }
        .form-control, .form-select {
            background-color: #f8f9fa;
            color: #333;
        }
        .submit-btn {
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 30px;
        }
        .submit-btn:hover {
            background-color: #ff1a75;
        }
        /* Style for output values */
        output {
            color: black; /* Set output text color to black */
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">BEINS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact Us</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Form Section -->
<section class="form-section">
    <div class="form-container">
        <h1>Customer Details</h1>
        <form action="" method="POST">
            <!-- Age Category Dropdown -->
            <div class="mb-3">
                <label for="age-category" class="form-label">Age Category</label>
                <select id="age-category" class="form-select" name="age-category" required>
                    <option value="" disabled selected>Select your age category</option>
                    <option value="<30">Less than 30 years</option>
                    <option value="30-40">30 - 40 years</option>
                    <option value="40-50">40 - 50 years</option>
                    <option value="50-60">50 - 60 years</option>
                    <option value=">60">More than 60 years</option>
                </select>
            </div>

            <!-- State Dropdown with All Indian States -->
            <div class="mb-3">
                <label for="state" class="form-label">State</label>
                <select id="state" class="form-select" name="state" required>
                    <option value="" disabled selected>Select your state</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="West Bengal">West Bengal</option>
                    <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                    <option value="Chandigarh">Chandigarh</option>
                    <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                    <option value="Lakshadweep">Lakshadweep</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Puducherry">Puducherry</option>
                </select>
            </div>

            <!-- Income Range Slider -->
            <div class="mb-3">
                <label for="income" class="form-label">Annual Income (₹)</label>
                <input type="range" class="form-range" min="0" max="10000000" id="income" name="income" value="0" oninput="this.nextElementSibling.value = this.value">
                <output>0</output>
            </div>

            <!-- Source of Income -->
            <div class="mb-3">
                <label for="source-income" class="form-label">Source of Income</label>
                <input type="text" class="form-control" id="source-income" name="source-income" required>
            </div>

            <!-- Investment Amount -->
            <div class="mb-3">
                <label for="investment" class="form-label">Investment Amount (₹)</label>
                <input type="range" class="form-range" min="0" max="10000000" id="income" name="investment" value="0" oninput="this.nextElementSibling.value = this.value">
                <output>0</output>
            </div>

            <!-- Number of People Financially Dependent -->
            <div class="mb-3">
                <label for="dependents" class="form-label">Number of People Financially Dependent</label>
                <input type="number" class="form-control" id="dependents" name="dependents" required>
            </div>

            <!-- Expected Return on Investment Dropdown -->
            <div class="mb-3">
                <label for="roi" class="form-label">Expected Return on Investment (%)</label>
                <select id="roi" class="form-select" name="roi" required>
                    <option value="" disabled selected>Select expected return</option>
                    <option value=">25%">Greater than 25%</option>
                    <option value="15-25%">15% - 25%</option>
                    <option value="10-15%">10% - 15%</option>
                    <option value="<10%">Less than 10%</option>
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn submit-btn w-100">Submit</button>
        </form>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
